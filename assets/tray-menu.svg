<svg width="420" height="300" viewBox="0 0 420 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sello sistem tepsisi sağ-tık menüsü">
  <defs>
    <filter id="sh3" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0b3a55" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="disk3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2ba3e0"/><stop offset="1" stop-color="#0f72ab"/>
    </linearGradient>
  </defs>
  <style>.t{font-family:"Segoe UI",system-ui,sans-serif}</style>

  <rect x="0" y="0" width="420" height="300" rx="14" fill="#eef3f6"/>

  <!-- sağ-tık menüsü -->
  <rect x="120" y="40" width="196" height="170" rx="10" fill="#ffffff" filter="url(#sh3)" stroke="#e6ecf0"/>
  <text x="140" y="73" class="t" fill="#2B2F33" font-size="13.5" font-weight="600">Takılı Kartlar</text>
  <text x="140" y="105" class="t" fill="#2B2F33" font-size="13.5" font-weight="600">Sistem Kontrolü</text>
  <text x="140" y="137" class="t" fill="#2B2F33" font-size="13.5" font-weight="600">Ayarlar</text>
  <line x1="136" y1="156" x2="300" y2="156" stroke="#e6ecf0"/>
  <text x="140" y="186" class="t" fill="#2B2F33" font-size="13.5" font-weight="600">Çıkış</text>

  <!-- görev çubuğu -->
  <rect x="0" y="250" width="420" height="50" rx="0" fill="#1f2a31"/>
  <rect x="0" y="286" width="420" height="14" fill="#16202680"/>
  <!-- tepsi simgeleri -->
  <rect x="300" y="263" width="16" height="16" rx="3" fill="#5A6166"/>
  <rect x="326" y="263" width="16" height="16" rx="3" fill="#5A6166"/>
  <!-- Sello mührü (vurgulu) -->
  <circle cx="364" cy="271" r="13" fill="url(#disk3)"/>
  <circle cx="364" cy="271" r="13" fill="none" stroke="#3f8f43" stroke-width="2" stroke-dasharray="0.1 4"/>
  <path d="M357 271 l5 5 9 -11" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- işaretçi oku menüye -->
  <path d="M364 258 L300 210" stroke="#9AA0A6" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>

  <!-- ipucu -->
  <text x="20" y="30" class="t" fill="#647580" font-size="12.5">Tepsi simgesine <tspan font-weight="700" fill="#1689CA">sağ-tık</tspan> → menü · <tspan font-weight="700" fill="#1689CA">sol çift-tık</tspan> → e-Devlet penceresi</text>
</svg>
