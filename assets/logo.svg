<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sello logosu">
  <defs>
    <linearGradient id="disk" x1="120" y1="96" x2="392" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2ba3e0"/>
      <stop offset="1" stop-color="#0f72ab"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.38" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0b3a55" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- yeşil boncuklu mühür kenarı -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="#3f8f43"
          stroke-width="13" stroke-linecap="round" stroke-dasharray="0.1 30.2"/>

  <!-- mavi gövde -->
  <circle cx="256" cy="256" r="206" fill="url(#disk)" filter="url(#soft)"/>
  <circle cx="256" cy="256" r="206" fill="url(#sheen)"/>

  <!-- iç beyaz halka + ince damga çizgisi -->
  <circle cx="256" cy="256" r="172" fill="none" stroke="#ffffff" stroke-width="7" stroke-opacity="0.92"/>
  <circle cx="256" cy="256" r="154" fill="none" stroke="#ffffff" stroke-width="3"
          stroke-opacity="0.6" stroke-dasharray="3 13"/>

  <!-- onay işareti (imzalandı/doğrulandı) -->
  <path d="M188 264 L236 312 L330 196" fill="none" stroke="#ffffff"
        stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- yeşil imza kuyruğu -->
  <path d="M196 346 q40 22 84 8 q44 -14 40 6" fill="none" stroke="#9be8a0"
        stroke-width="11" stroke-linecap="round" stroke-opacity="0.95"/>
</svg>
