<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sello — Kurulum Panosu</title>
  <style>
    :root { --blue:#1689CA; --ink:#2f3437; --muted:#9aa0a6; --line:#e6eaed; --bg:#f6f8fa; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, "Segoe UI", Roboto, sans-serif; color:var(--ink);
           background:var(--bg); }
    header { display:flex; align-items:center; gap:12px; padding:14px 22px; background:#fff;
             border-bottom:1px solid var(--line); position:sticky; top:0; }
    header .logo { width:24px; height:24px; background:var(--blue); border-radius:5px; flex:none; }
    header h1 { font-size:16px; margin:0; flex:1; }
    header .who { font-size:12px; color:var(--muted); }
    button { font:inherit; cursor:pointer; border:1px solid var(--line); background:#fff;
             padding:7px 14px; border-radius:7px; }
    button.primary { background:var(--blue); color:#fff; border-color:var(--blue); }
    button:hover { filter:brightness(0.97); }
    main { padding:22px; max-width:1100px; margin:0 auto; }
    .cards { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:14px 18px;
            min-width:140px; }
    .card .n { font-size:24px; font-weight:700; }
    .card .l { font-size:12px; color:var(--muted); }
    .toolbar { display:flex; gap:10px; margin-bottom:12px; align-items:center; }
    .toolbar input { flex:1; padding:9px 12px; border:1px solid var(--line); border-radius:8px;
                     font:inherit; }
    table { width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--line);
            border-radius:10px; overflow:hidden; }
    th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); font-size:13px;
             white-space:nowrap; }
    th { background:#fafbfc; color:#5a6166; font-weight:600; cursor:pointer; user-select:none; }
    tr:last-child td { border-bottom:none; }
    td.mono { font-family: ui-monospace, "Consolas", monospace; }
    .pill { background:#eef6fb; color:#1b6fa3; padding:2px 8px; border-radius:20px; font-size:12px; }
    .muted { color:var(--muted); }
    #signin { display:flex; flex-direction:column; align-items:center; gap:14px; padding:80px 20px;
              text-align:center; }
    #msg { color:#b3261e; font-size:13px; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <header>
    <div class="logo"></div>
    <h1>Sello — Kurulum Panosu</h1>
    <span id="who" class="who"></span>
    <button id="refreshBtn" class="hidden">Yenile</button>
    <button id="signoutBtn" class="hidden">Çıkış</button>
  </header>

  <div id="signin">
    <p>Kurulum verilerini görmek için Google hesabınla giriş yap.</p>
    <button id="signinBtn" class="primary">Google ile giriş yap</button>
    <p id="msg"></p>
  </div>

  <main id="dash" class="hidden">
    <div class="cards">
      <div class="card"><div id="cTotal" class="n">—</div><div class="l">Toplam makine</div></div>
      <div class="card"><div id="cActive" class="n">—</div><div class="l">Son 7 gün aktif</div></div>
      <div class="card"><div id="cOpens" class="n">—</div><div class="l">Toplam açılış</div></div>
      <div class="card"><div id="cVersions" class="n">—</div><div class="l">Sürüm sayısı</div></div>
    </div>
    <div class="toolbar">
      <input id="search" type="text" placeholder="Ara: bilgisayar adı, lisans, sürüm, kullanıcı…" />
      <span id="count" class="muted"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th data-k="license_code">Lisans</th>
          <th data-k="hostname">Bilgisayar</th>
          <th data-k="username">Kullanıcı</th>
          <th data-k="version">Sürüm</th>
          <th data-k="open_count">Açılış</th>
          <th data-k="last_seen">Son görülme</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAcmTGo_M9oZggQWtHigY3UmWlbper_Cdg",
      authDomain: "sello-lisans.firebaseapp.com",
      projectId: "sello-lisans",
      storageBucket: "sello-lisans.firebasestorage.app",
      messagingSenderId: "158948390903",
      appId: "1:158948390903:web:a1f443b8d66f09ffd8a0f2"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const $ = (id) => document.getElementById(id);
    let data = [];
    let sortKey = "last_seen", sortDir = -1;

    $("signinBtn").onclick = () =>
      signInWithPopup(auth, new GoogleAuthProvider()).catch(e => $("msg").textContent = e.message);
    $("signoutBtn").onclick = () => signOut(auth);
    $("refreshBtn").onclick = load;
    $("search").addEventListener("input", render);
    document.querySelectorAll("th[data-k]").forEach(th => th.onclick = () => {
      const k = th.dataset.k;
      sortDir = (sortKey === k) ? -sortDir : (k === "last_seen" || k === "open_count" ? -1 : 1);
      sortKey = k; render();
    });

    onAuthStateChanged(auth, (user) => {
      const on = !!user;
      $("signin").classList.toggle("hidden", on);
      $("dash").classList.toggle("hidden", !on);
      $("refreshBtn").classList.toggle("hidden", !on);
      $("signoutBtn").classList.toggle("hidden", !on);
      $("who").textContent = on ? user.email : "";
      if (on) load();
    });

    async function load() {
      try {
        const snap = await getDocs(collection(db, "kurulumlar"));
        data = snap.docs.map(d => d.data());
        stats(); render();
      } catch (e) {
        $("msg").textContent = "Okuma hatası (yetki?): " + e.message;
      }
    }

    function tsMillis(v) { // Firestore timestamp -> ms
      if (!v) return 0;
      if (typeof v === "object" && v.seconds != null) return v.seconds * 1000;
      const t = Date.parse(v); return isNaN(t) ? 0 : t;
    }
    function fmt(v) {
      const ms = tsMillis(v); if (!ms) return "—";
      return new Date(ms).toLocaleString("tr-TR");
    }

    function stats() {
      const now = Date.now(), week = 7 * 864e5;
      $("cTotal").textContent = data.length;
      $("cActive").textContent = data.filter(d => now - tsMillis(d.last_seen) < week).length;
      $("cOpens").textContent = data.reduce((s, d) => s + (Number(d.open_count) || 0), 0);
      $("cVersions").textContent = new Set(data.map(d => d.version || "?")).size;
    }

    function render() {
      const q = $("search").value.trim().toLowerCase();
      let rows = data.filter(d => !q ||
        [d.license_code, d.hostname, d.username, d.version].join(" ").toLowerCase().includes(q));
      rows.sort((a, b) => {
        let x = a[sortKey], y = b[sortKey];
        if (sortKey === "last_seen") { x = tsMillis(x); y = tsMillis(y); }
        else if (sortKey === "open_count") { x = Number(x) || 0; y = Number(y) || 0; }
        else { x = (x || "").toString().toLowerCase(); y = (y || "").toString().toLowerCase(); }
        return x < y ? -sortDir : x > y ? sortDir : 0;
      });
      $("count").textContent = rows.length + " kayıt";
      $("rows").innerHTML = rows.map(d => `
        <tr>
          <td class="mono"><span class="pill">${esc(d.license_code) || "—"}</span></td>
          <td>${esc(d.hostname) || "—"}</td>
          <td class="muted">${esc(d.username) || "—"}</td>
          <td>${esc(d.version) || "—"}</td>
          <td>${Number(d.open_count) || 0}</td>
          <td>${fmt(d.last_seen)}</td>
        </tr>`).join("");
    }
    function esc(s) { return (s == null ? "" : String(s)).replace(/[<>&]/g, c =>
      ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c])); }
  </script>
</body>
</html>
